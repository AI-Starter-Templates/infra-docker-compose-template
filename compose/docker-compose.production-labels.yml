# Prod overlay — merged by dev.sh when STACK=prod.
#
# Routing model: same-origin path routing.
#   - Host(PUBLIC_UI_HOST):                          → ui (nginx static + SPA)
#   - Host(PUBLIC_UI_HOST) && PathPrefix(/api):       → api (Elysia at /api/v1/*)
#   - Host(PUBLIC_UI_HOST) && Path(/health):          → api (health probe)
#
# One domain, one TLS cert, no CORS. The api router has a higher priority so
# it matches before the ui fallback. The api container does NOT have a prefix
# stripped — Elysia already serves under /api/v1/*, so the path stays intact.
#
# Required env: PUBLIC_UI_HOST, ACME_EMAIL.

services:
  traefik:
    # Compose REPLACES `command:` from the base file (it does not merge
    # arrays). Dashboard is deliberately omitted here so it's not reachable
    # in prod — re-add `--api.dashboard=true` + an auth-protected router if
    # you need it.
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker.network=frontend"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL:-you@example.com}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      # Prometheus metrics on a separate internal entrypoint (mirrors base).
      - "--entryPoints.metrics.address=:8899"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    labels:
      # ----- Shared middleware definitions ------------------------------------
      # Security headers — single source of truth for the whole stack. Applied
      # to both routers below. Helmet was removed from the api; nginx in ui
      # no longer sets headers. This is where every browser-visible header
      # comes from.
      - "traefik.enable=true"
      - "traefik.http.middlewares.boringstack-security-headers.headers.framedeny=true"
      - "traefik.http.middlewares.boringstack-security-headers.headers.sslredirect=true"
      - "traefik.http.middlewares.boringstack-security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.boringstack-security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.boringstack-security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.boringstack-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.boringstack-security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.boringstack-security-headers.headers.permissionsPolicy=camera=(), geolocation=(), microphone=(), payment=(), usb=(), picture-in-picture=()"
      # Origin-side compression. Cloudflare also brotli-compresses at the edge;
      # this keeps cache-miss latency down between origin and edge.
      - "traefik.http.middlewares.boringstack-compress.compress=true"
      # CSP for the SPA — applied only on the ui router. The api returns JSON,
      # CSP is meaningless there.
      - "traefik.http.middlewares.boringstack-ui-csp.headers.customResponseHeaders.Content-Security-Policy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

  api:
    labels:
      - "traefik.enable=true"
      # Higher priority than ui — matches /api/* and /health first.
      - "traefik.http.routers.api.rule=Host(`${PUBLIC_UI_HOST}`) && (PathPrefix(`/api`) || Path(`/health`))"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
      # Rate limit applies to the api router only.
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.period=1s"
      - "traefik.http.routers.api.middlewares=boringstack-security-headers,boringstack-compress,api-ratelimit"
      - "traefik.docker.network=backend"

  ui:
    labels:
      - "traefik.enable=true"
      # Lower priority than api — acts as the host-wide fallback for everything
      # not under /api or /health (i.e., the SPA shell and its assets).
      - "traefik.http.routers.ui.rule=Host(`${PUBLIC_UI_HOST}`)"
      - "traefik.http.routers.ui.priority=1"
      - "traefik.http.routers.ui.entrypoints=websecure"
      - "traefik.http.routers.ui.tls=true"
      - "traefik.http.routers.ui.tls.certresolver=myresolver"
      - "traefik.http.services.ui.loadbalancer.server.port=8080"
      - "traefik.http.routers.ui.middlewares=boringstack-security-headers,boringstack-ui-csp,boringstack-compress"
      - "traefik.docker.network=frontend"
