# Production overlay: HTTPS redirect, ACME HTTP-01, TLS routers for api + ui containers.
# Merge: docker compose -f docker-compose.yml -f docker-compose.production-labels.yml --profile prod up -d
# Set PUBLIC_API_HOST, PUBLIC_UI_HOST, ACME_EMAIL in compose/.env (real DNS names for ACME).

services:
  traefik:
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker.network=frontend"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL:-you@example.com}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt

  api:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${PUBLIC_API_HOST}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.api-security-headers.headers.framedeny=true"
      - "traefik.http.middlewares.api-security-headers.headers.sslredirect=true"
      - "traefik.http.middlewares.api-security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.api-security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.api-security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.api-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.api-security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.api-security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.api-security-headers.headers.permissionsPolicy=geolocation=(), microphone=(), camera=()"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.period=1s"
      - "traefik.http.routers.api.middlewares=api-security-headers,api-ratelimit"
      - "traefik.docker.network=backend"

  ui:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=Host(`${PUBLIC_UI_HOST}`)"
      - "traefik.http.routers.ui.entrypoints=websecure"
      - "traefik.http.routers.ui.tls=true"
      - "traefik.http.routers.ui.tls.certresolver=myresolver"
      - "traefik.http.services.ui.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.ui-security-headers.headers.framedeny=true"
      - "traefik.http.middlewares.ui-security-headers.headers.sslredirect=true"
      - "traefik.http.middlewares.ui-security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.ui-security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.ui-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.ui-security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.ui-security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.routers.ui.middlewares=ui-security-headers"
      - "traefik.docker.network=frontend"
