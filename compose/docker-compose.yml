# =============================================================================
# ai-starter-infra — base compose stack
#
# Architecture
#   - Always-on:  postgres (data), valkey (cache/queues),
#                 api-migrate (one-shot — applies schema + seeds demo user)
#   - Dev profile (STACK=dev):  api-dev + ui-dev (bind-mount source, hot reload)
#                               Browser hits Vite directly; Vite proxies /api/*
#                               to api-dev. NO Traefik in dev.
#   - Prod profile (STACK=prod): api + ui (built from production Dockerfiles)
#                               Traefik terminates TLS and path-routes:
#                               /api/* + /health → api; everything else → ui.
#
# Networks
#   - backend:  data + api services (postgres, valkey, api[-dev], api-migrate)
#   - frontend: anything browser-facing (traefik, ui)
#   - In dev, api-dev is on the backend network only; the browser reaches
#     it via Vite's server-side proxy, not directly.
#
# How to run
#   ./dev.sh up -d                 # dev profile (default), open localhost:3001
#   STACK=prod ./dev.sh up -d      # prod profile
#
# Overlays merged automatically by dev.sh:
#   - docker-compose.development-labels.yml  (dev: host-published data ports)
#   - docker-compose.production-labels.yml   (prod: Traefik HTTPS + ACME + path
#                                             routing + security middlewares)
# =============================================================================

name: ai-starter-infra

# Default Docker logging: rotate at 10 MB, keep 5 files per container. With six
# always-on services that's ~300 MB max log footprint on disk, which is fine
# even on the cheapest Hetzner VPS. Without this, json-file logs grow forever.
# Services with structured shipping (Loki + Promtail when observability is on)
# still get json-file rotation as a belt-and-braces fallback.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_LIMITS_CPUS:-1.0}"
          memory: "${POSTGRES_LIMITS_MEMORY:-512M}"
        reservations:
          cpus: "${POSTGRES_RESERVATIONS_CPUS:-0.25}"
          memory: "${POSTGRES_RESERVATIONS_MEMORY:-128M}"

  valkey:
    # Valkey — BSD-licensed Redis-protocol-compatible store (Linux Foundation
    # fork of Redis 7.2.4, drop-in compatible with Redis clients).
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - valkey_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "${VALKEY_LIMITS_CPUS:-0.5}"
          memory: "${VALKEY_LIMITS_MEMORY:-256M}"
        reservations:
          cpus: "${VALKEY_RESERVATIONS_CPUS:-0.1}"
          memory: "${VALKEY_RESERVATIONS_MEMORY:-64M}"

  traefik:
    # Pinned to v3.7 (current stable). Earlier 3.x minors negotiate an
    # Engine API version that modern Docker daemons reject.
    # Prod-only. Dev uses Vite's dev-server proxy directly.
    image: traefik:v3.7
    container_name: ai-starter-traefik
    profiles: [prod]
    user: root
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker.network=frontend"
      # Prometheus metrics on a separate entrypoint, internal-network only
      # (not published to the host). Scraped by Prometheus when the
      # observability overlay is active; harmless otherwise.
      - "--entryPoints.metrics.address=:8899"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: "${TRAEFIK_LIMITS_CPUS:-0.5}"
          memory: "${TRAEFIK_LIMITS_MEMORY:-256M}"
        reservations:
          cpus: "${TRAEFIK_RESERVATIONS_CPUS:-0.1}"
          memory: "${TRAEFIK_RESERVATIONS_MEMORY:-64M}"

  # One-shot: apply schema and (optionally) seed a superuser from
  # SUPERUSER_EMAIL + SUPERUSER_PASSWORD, then exit 0. api(-dev) waits for
  # service_completed_successfully so a fresh `up` always lands with a usable
  # DB. Reuses the dev image because drizzle-kit is a devDep.
  api-migrate:
    profiles: [dev, prod]
    build:
      context: ../../api-template
      dockerfile: Dockerfile
    restart: "no"
    logging: *default-logging
    working_dir: /app
    volumes:
      - ../../api-template:/app
    command:
      - "sh"
      - "-c"
      - "bun install && bun run db:push --force && bun run db:seed"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app_dev_password}@postgres:5432/${POSTGRES_DB:-app}
      # Env-validator placeholders. The migrate+seed scripts import from
      # src/clients/postgres, which triggers the API's full env validator
      # at module load. The values themselves are never used during
      # migration — only the schema check matters here. Locally Bun's
      # auto-`.env` masks this; CI has no .env, so the placeholders are
      # required for the validator to pass.
      NODE_ENV: development
      JWT_SECRET: api-migrate-placeholder-secret-padded-to-thirty-two
      # Same-origin dev: Vite proxies /api/* to api-dev. No CORS needed.
      FRONTEND_URL: http://localhost:3001
      ALLOWED_ORIGINS: ""
      PUBLIC_API_URL: http://localhost:3001/api
      # Optional superuser bootstrap. Empty = seed script skips. Both set =
      # an admin user is created on the first migrate.
      #
      # Set these in `compose/.env` (this directory's .env), NOT in
      # `api-template/.env` — Docker Compose interpolates `${SUPERUSER_EMAIL}`
      # against its own env (this file + shell), and the explicit `:-` default
      # below overrides anything Bun's .env loader would do inside the
      # container.
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "${API_MIGRATE_LIMITS_CPUS:-0.5}"
          memory: "${API_MIGRATE_LIMITS_MEMORY:-512M}"

  api-dev:
    profiles: [dev]
    build:
      context: ../../api-template
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    working_dir: /app
    volumes:
      - ../../api-template:/app
    command:
      - "sh"
      - "-c"
      - "bun install && exec bun run dev"
    env_file:
      - path: ./api.dev.env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app_dev_password}@postgres:5432/${POSTGRES_DB:-app}
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      NODE_ENV: development
      BUN_ENV: development
      PORT: "3000"
      JWT_SECRET: ${API_DEV_JWT_SECRET:-docker-compose-api-dev-jwt-secret-keys}
      FRONTEND_URL: ${API_DEV_FRONTEND_URL:-http://localhost:3001}
      # Same-origin dev via Vite proxy: browser only ever sees localhost:3001,
      # so no Origin header on cross-origin preflights — CORS is unused.
      # Set ALLOWED_ORIGINS to a non-empty value only if you need to expose the
      # api directly across origins (e.g., curl from another host).
      ALLOWED_ORIGINS: ${API_DEV_ALLOWED_ORIGINS:-}
      PUBLIC_API_URL: ${API_DEV_PUBLIC_API_URL:-http://localhost:3001/api}
      # Realtime notifications via SSE. Default `true` in dev because the
      # ui-template mounts the consumer on every authenticated route and
      # would otherwise hit 404 on /api/v1/notifications/stream. Prod stays
      # opt-in (the api's env validator defaults to false there).
      NOTIFICATIONS_SSE_ENABLED: ${API_DEV_NOTIFICATIONS_SSE_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    networks:
      - backend
      - frontend
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: "${API_DEV_LIMITS_CPUS:-1.5}"
          memory: "${API_DEV_LIMITS_MEMORY:-1G}"
        reservations:
          cpus: "${API_DEV_RESERVATIONS_CPUS:-0.25}"
          memory: "${API_DEV_RESERVATIONS_MEMORY:-256M}"

  ui-dev:
    profiles: [dev]
    build:
      context: ../../ui-template
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    working_dir: /app
    volumes:
      # Bind-mount the source for HMR. The anonymous volume on /app/node_modules
      # shadows the bind mount so the container keeps the image's install
      # (Alpine/musl binaries; pnpm 11's allowBuilds outputs already executed at
      # build time) instead of being overlaid by whatever the host has — most
      # painfully a glibc node_modules from a host-side `pnpm install` on
      # WSL2/Linux, or an empty `node_modules` on a fresh clone.
      - ../../ui-template:/app
      - ui_dev_node_modules:/app/node_modules
    environment:
      CI: "true"
      # Empty => same-origin (browser uses relative paths). Vite's dev server
      # forwards /api to VITE_API_PROXY_TARGET inside the docker network.
      VITE_API_URL: ""
      VITE_API_PROXY_TARGET: http://api-dev:3000
    # node_modules is built into the image. We skip the historical
    # `pnpm install &&` prefix because every cold start was re-running the
    # git-hosted plugin `prepare` builds — multi-minute on WSL2 over a bind
    # mount. Rebuild the image (`./dev.sh up --build`) after touching
    # package.json / pnpm-lock.yaml / pnpm-workspace.yaml.
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    depends_on:
      api-dev:
        condition: service_healthy
    networks:
      - frontend
    ports:
      - "3001:3001"
    deploy:
      resources:
        limits:
          cpus: "${UI_DEV_LIMITS_CPUS:-1.5}"
          memory: "${UI_DEV_LIMITS_MEMORY:-1G}"
        reservations:
          cpus: "${UI_DEV_RESERVATIONS_CPUS:-0.25}"
          memory: "${UI_DEV_RESERVATIONS_MEMORY:-256M}"

  api:
    profiles: [prod]
    # Default deploy pulls from GHCR (see api-template/.github/workflows/release.yml).
    # `build:` is kept so `docker compose build` still works for local prod
    # smoke tests / CI.
    #
    # If you forked via "Use this template" and renamed your api repo, set
    # API_IMAGE_NAME=<your-renamed-repo> in compose/.env. The workflow uses
    # ${{ github.event.repository.name }}, so its image path follows the
    # rename automatically — only the consumer side here needs to know.
    image: ${API_IMAGE:-ghcr.io/${IMAGE_OWNER:-ai-starter-templates}/${API_IMAGE_NAME:-api-template}:${API_IMAGE_TAG:-latest}}
    build:
      context: ../../api-template
      dockerfile: Dockerfile.prod
    labels:
      # WUD discovers and tracks this image. Notifications via Discord webhook
      # (WUD_DISCORD_WEBHOOK) when a newer tag is available.
      - "wud.watch=true"
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    env_file:
      - path: ./api.prod.env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app_dev_password}@postgres:5432/${POSTGRES_DB:-app}
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      NODE_ENV: production
      BUN_ENV: production
      PORT: "3000"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "${API_LIMITS_CPUS:-1.0}"
          memory: "${API_LIMITS_MEMORY:-512M}"
        reservations:
          cpus: "${API_RESERVATIONS_CPUS:-0.25}"
          memory: "${API_RESERVATIONS_MEMORY:-128M}"

  ui:
    profiles: [prod]
    # Default deploy pulls from GHCR (see ui-template/.github/workflows/release.yml).
    # `build:` is kept so `docker compose build` still works for local prod
    # smoke tests / CI.
    #
    # If you forked via "Use this template" and renamed your ui repo, set
    # UI_IMAGE_NAME=<your-renamed-repo> in compose/.env.
    image: ${UI_IMAGE:-ghcr.io/${IMAGE_OWNER:-ai-starter-templates}/${UI_IMAGE_NAME:-ui-template}:${UI_IMAGE_TAG:-latest}}
    build:
      context: ../../ui-template
      dockerfile: Dockerfile.prod
      # Same-origin path routing: SPA hits /api/* on the same host that serves
      # it, so VITE_API_URL is empty and the build is domain-agnostic. Override
      # only if you need to point the SPA at a different origin (cross-origin
      # deployments require ALLOWED_ORIGINS in the api too).
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-}
    labels:
      - "wud.watch=true"
    restart: unless-stopped
    logging: *default-logging
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "${UI_LIMITS_CPUS:-0.5}"
          memory: "${UI_LIMITS_MEMORY:-128M}"
        reservations:
          cpus: "${UI_RESERVATIONS_CPUS:-0.1}"
          memory: "${UI_RESERVATIONS_MEMORY:-32M}"

volumes:
  postgres_data:
  valkey_data:
  letsencrypt_data:
  # Anonymous-style named volume that shadows the ui-template bind mount's
  # `node_modules` directory. Keeps the container using the Alpine/musl
  # install baked into the dev image instead of whatever happens to live on
  # the host (empty on a fresh clone; glibc binaries from a host-side
  # `pnpm install` on Linux/WSL2 — both break the dev server).
  ui_dev_node_modules:
