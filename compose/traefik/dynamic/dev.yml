# Dev routing: Traefik (in Docker) -> processes on the host (api-template / ui-template).
# Hosts default to api.localhost / app.localhost. Add them to /etc/hosts pointing at 127.0.0.1 if needed.
# Linux: ensure compose/traefik service has extra_hosts host.docker.internal:host-gateway (set in docker-compose.yml).

http:
  routers:
    to_api:
      rule: "Host(`api.localhost`)"
      entryPoints:
        - web
      service: svc_api_host
    to_ui:
      rule: "Host(`app.localhost`)"
      entryPoints:
        - web
      service: svc_ui_host
  services:
    svc_api_host:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3000"
    svc_ui_host:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3001"
